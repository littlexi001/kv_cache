<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Explicit Frequency-Based MoE</title>
  <desc id="desc">A post-attention residual hidden state is projected onto the feature basis of an output matrix, split into high, mid, and low frequency bands. The high-frequency band does not route; mid and low bands produce separate gates. All experts still receive the original hidden state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#344054"/>
    </marker>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #182230; font-size: 18px; font-weight: 600; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; font-size: 14px; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; font-size: 12px; }
      .box { stroke: #344054; stroke-width: 1.5; rx: 8; }
      .input { fill: #F2F4F7; }
      .basis { fill: #F9F5FF; }
      .high { fill: #E0F2FE; }
      .mid { fill: #ECFDF3; }
      .low { fill: #FFF7ED; }
      .expert { fill: #FFFFFF; }
      .route { stroke: #344054; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #98A2B3; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="20" y="20" width="940" height="460" rx="14" fill="#FCFCFD" stroke="#D0D5DD"/>
  <text x="40" y="58" class="label">本次新增：Explicit Frequency-Based MoE</text>
  <text x="40" y="84" class="small">用已定义的 feature frequency band 做 router 输入；expert 输入仍然是同一个 post-attention residual 表征 h。</text>

  <rect x="55" y="210" width="150" height="70" class="box input"/>
  <text x="80" y="238" class="label">同一个 h</text>
  <text x="74" y="262" class="small">post-attn residual</text>

  <rect x="270" y="192" width="170" height="106" class="box basis"/>
  <text x="304" y="222" class="label">O 矩阵</text>
  <text x="291" y="246" class="small">feature projection</text>
  <text x="292" y="270" class="small">z = h V_O Sigma</text>

  <path d="M205 245 L270 245" class="route"/>

  <rect x="505" y="78" width="160" height="72" class="box high"/>
  <text x="534" y="107" class="label">0%-10%</text>
  <text x="523" y="131" class="small">高频 feature</text>

  <rect x="505" y="214" width="160" height="72" class="box mid"/>
  <text x="530" y="243" class="label">10%-20%</text>
  <text x="518" y="267" class="small">中频 feature gate</text>

  <rect x="505" y="350" width="160" height="72" class="box low"/>
  <text x="530" y="379" class="label">20%-100%</text>
  <text x="518" y="403" class="small">低频 feature gate</text>

  <path d="M440 245 C470 120, 478 114, 505 114" class="route"/>
  <path d="M440 245 L505 250" class="route"/>
  <path d="M440 245 C470 380, 478 386, 505 386" class="route"/>

  <rect x="735" y="70" width="170" height="88" class="box expert"/>
  <text x="766" y="102" class="label">Common Expert</text>
  <text x="761" y="126" class="small">不分发，所有 h 进入</text>
  <text x="769" y="145" class="tiny">尺寸最大，常驻 HBM</text>

  <rect x="735" y="204" width="170" height="92" class="box expert"/>
  <text x="757" y="235" class="label">Mid Experts</text>
  <text x="759" y="259" class="small">10 x n1 gate</text>
  <text x="761" y="278" class="tiny">expert 输入仍是 h</text>

  <rect x="735" y="340" width="170" height="92" class="box expert"/>
  <text x="758" y="371" class="label">Low Experts</text>
  <text x="759" y="395" class="small">80 x n2 gate</text>
  <text x="758" y="414" class="tiny">按需 prefetch / swap</text>

  <path d="M665 114 L735 114" class="route"/>
  <path d="M665 250 L735 250" class="route"/>
  <path d="M665 386 L735 386" class="route"/>

  <path d="M205 245 C430 40, 650 35, 735 96" class="dash"/>
  <path d="M205 245 C430 195, 650 195, 735 234" class="dash"/>
  <path d="M205 245 C430 445, 650 450, 735 404" class="dash"/>

  <text x="58" y="448" class="tiny">实线：feature-band projection 只用于产生 gate；虚线：所有 experts 的实际输入都是同一个 h。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2980b9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8e44ad"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">奇异值放大的形成、强化与干预</text>

  <!-- ===== LEFT COLUMN: Causal Chain ===== -->
  <rect x="30" y="58" width="440" height="640" fill="white" stroke="#bdc3c7" stroke-width="1.5" rx="6"/>
  <text x="250" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">因果链：从起源到伤害</text>

  <!-- Stage 1: Origin -->
  <rect x="55" y="105" width="390" height="105" fill="#fff3cd" stroke="#f39c12" stroke-width="1.5" rx="6"/>
  <text x="250" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#e67e22">阶段一：大奇异方向的起源</text>
  <text x="250" y="150" text-anchor="middle" font-size="11" fill="#555">高频句法 token（如 "and"）：前接一切、后接一切、频率极高</text>
  <text x="250" y="170" text-anchor="middle" font-size="11" fill="#555">作为 target → 被所有前文合力拉向全体 token 的均值方向</text>
  <text x="250" y="190" text-anchor="middle" font-size="11" fill="#555">作为 input → 向所有 hidden state 注入共享成分</text>
  <text x="250" y="205" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="600">→ σ₁ 方向 = 高频 token 方向 = 全体 token 均值方向</text>

  <line x1="250" y1="210" x2="250" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Stage 2: Amplification -->
  <rect x="55" y="245" width="390" height="135" fill="#fce4d6" stroke="#e67e22" stroke-width="1.5" rx="6"/>
  <text x="250" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#d35400">阶段二：嵌套语言结构的放大效应</text>
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#555">短 pattern 先收敛 → 改变 embedding 方向</text>
  <text x="250" y="308" text-anchor="middle" font-size="11" fill="#555">长 pattern 继承时面对的是已被占据的方向</text>
  <text x="250" y="326" text-anchor="middle" font-size="11" fill="#555">→ σ₁ 持续膨胀，低频方向的 σ₄ 几乎冻住</text>
  <text x="250" y="350" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">反馈：σ₁ 大 → 沿 σ₁ 走 loss 降得多 → 优化器偏好 → σ₁ 更大</text>
  <text x="250" y="370" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">→ 链式继承 × 频率不对称 → 方向持续被放大</text>

  <line x1="250" y1="380" x2="250" y2="410" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Stage 3: Saturation & Harm -->
  <rect x="55" y="415" width="390" height="115" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
  <text x="250" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">阶段三：饱和与对长尾的伤害</text>
  <text x="250" y="460" text-anchor="middle" font-size="11" fill="#555">高频 token 已全部收敛到此方向，loss 对它们已足够低</text>
  <text x="250" y="480" text-anchor="middle" font-size="11" fill="#c0392b">长尾 token 的独立方向 σ₄ 被冻结，d_eff ≪ d</text>
  <text x="250" y="498" text-anchor="middle" font-size="11" fill="#c0392b">低频 token 表示被稀释，内部循环变慢，容量浪费</text>
  <text x="250" y="520" text-anchor="middle" font-size="10" fill="#888" font-style="italic">此阶段为后果，不再适合单点干预；方案应在阶段一、二介入</text>

  <!-- Feedback self-loop for Stage 2 -->
  <path d="M420,310 C440,310 440,340 425,355" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="490" y1="58" x2="490" y2="698" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ===== RIGHT COLUMN: Interventions ===== -->
  <rect x="510" y="58" width="420" height="640" fill="white" stroke="#bdc3c7" stroke-width="1.5" rx="6"/>
  <text x="720" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">干预方案</text>

  <!-- Intervention A: Stage 1 — Origin — Loss Reweighting -->
  <rect x="535" y="115" width="370" height="90" fill="#e8f8f5" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="720" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#1e8449">A. 切断起因：Loss Reweighting</text>
  <text x="720" y="158" text-anchor="middle" font-size="11" fill="#555">降低高频 target 的梯度权重</text>
  <text x="720" y="176" text-anchor="middle" font-size="11" fill="#555">w_i ← w_i^base / f_target^α  (α ≈ 0.3–0.5)</text>
  <text x="720" y="196" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="600">证据：σ₁/σ₄ 从 1.52 → 1.018，gap 从 526 → −19</text>

  <!-- Connect A → Stage 1 -->
  <line x1="535" y1="160" x2="505" y2="160" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="160" x2="505" y2="160" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="160" x2="448" y2="160" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGreen)"/>

  <!-- Intervention B: Stage 2 — Optimizer-based -->
  <rect x="535" y="245" width="370" height="105" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5" rx="6"/>
  <text x="720" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#2471a3">B. 优化器侧：阻断反馈循环</text>
  <text x="720" y="290" text-anchor="middle" font-size="11" fill="#555">梯度方向归一化：消除 σ 大小对 loss 下降效率的影响</text>
  <text x="720" y="308" text-anchor="middle" font-size="11" fill="#555">大 LR + Reweighting：低频 token 获得更多有效更新</text>
  <text x="720" y="326" text-anchor="middle" font-size="11" fill="#555">Reweighting 在此阶段可能需调整形式（α 衰减等）</text>
  <text x="720" y="344" text-anchor="middle" font-size="11" fill="#2471a3" font-weight="600">证据：lr=0.18 时 G2G0→G1 从永不 → 101 步</text>

  <!-- Connect B → Stage 2 -->
  <line x1="535" y1="298" x2="505" y2="298" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="298" x2="505" y2="312" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="312" x2="448" y2="312" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>

  <!-- Intervention C: Stage 2 — MoE-based -->
  <rect x="535" y="385" width="370" height="105" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="720" y="408" text-anchor="middle" font-size="12" font-weight="700" fill="#6c3483">C. 模型侧：空间隔离 (MoE)</text>
  <text x="720" y="430" text-anchor="middle" font-size="11" fill="#555">将不同频率/语义的 token 路由至不同 expert</text>
  <text x="720" y="448" text-anchor="middle" font-size="11" fill="#555">低频 token 拥有独立子空间，免受高频 σ₁ 污染</text>
  <text x="720" y="466" text-anchor="middle" font-size="11" fill="#555">需要语义门控：语义相近 → 相近 expert</text>
  <text x="720" y="484" text-anchor="middle" font-size="11" fill="#8e44ad" font-weight="600">与 A、B 互补，可联合使用覆盖不同机制路径</text>

  <!-- Connect C → Stage 2 -->
  <line x1="535" y1="438" x2="505" y2="438" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="438" x2="505" y2="380" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="505" y1="380" x2="448" y2="380" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowPurple)"/>

  <!-- Summary box at bottom of right -->
  <rect x="535" y="530" width="370" height="60" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="6"/>
  <text x="720" y="550" text-anchor="middle" font-size="11" fill="#555">A 作用于阶段一（切断起源）</text>
  <text x="720" y="568" text-anchor="middle" font-size="11" fill="#555">B、C 作用于阶段二（阻断放大循环）</text>
  <text x="720" y="586" text-anchor="middle" font-size="11" fill="#888">阶段三为后果，不再适合单点干预</text>

  <!-- Key at bottom -->
  <text x="480" y="715" text-anchor="middle" font-size="10" fill="#888">干预逻辑：A 削减源头 → B 阻断循环 → C 隔离子空间。阶段三为已发生的损害，应在前两阶段预防。</text>
</svg>
